lint:
  use:
    - DEFAULT
  enum_zero_value_suffix: _NONE
  service_suffix: API
  ignore: []
  except: []
  allow_comment_ignores: false
  ignore_only: {}
deps:
generate:
  inputs:
    - directory: oghamproto
  plugins:
    - name: prost
      out: ../crates/ogham-proto/src
    - name: prost-serde
      out: ../crates/ogham-proto/src
    - name: tonic
      out: ../crates/ogham-proto/src
    - name: prost-crate
      out: ../crates/ogham-proto
      opts:
        gen_crate: ./assets/Cargo.toml.tmpl
    - name: go
      out: ../go
      opts:
        paths: source_relative
    - name: go-grpc
      out: ../go
      opts:
        paths: source_relative
    - name: es
      out: ../ts
      opts:
        target: ts
        import_extension: ts
        json_types: true
        valid_types: legacy_required+protovalidate_required
breaking:
  ignore: []
  against_git_ref: main
