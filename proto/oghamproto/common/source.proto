syntax = "proto3";

package oghamproto.common;

option go_package = "github.com/oghamlang/go/oghamproto/common";

// Byte range in source text.
message SourceSpan {
    uint32 start = 1;
    uint32 end = 2;
}

// Location in a source file.
message SourceLocation {
    string file = 1;
    SourceSpan span = 2;
    uint32 line = 3;
    uint32 column = 4;
}
